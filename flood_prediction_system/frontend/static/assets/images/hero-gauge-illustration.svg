<svg width="420" height="460" viewBox="0 0 420 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21C7C0"/>
      <stop offset="100%" stop-color="#0D5D58"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21C7C0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#21C7C0" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>

  <circle cx="210" cy="230" r="180" fill="url(#heroGlow)"/>

  <!-- concentric radar rings -->
  <circle cx="210" cy="230" r="150" stroke="#21C7C0" stroke-opacity="0.12" fill="none"/>
  <circle cx="210" cy="230" r="115" stroke="#21C7C0" stroke-opacity="0.16" fill="none"/>
  <circle cx="210" cy="230" r="80" stroke="#21C7C0" stroke-opacity="0.22" fill="none"/>

  <!-- gauge tube -->
  <g>
    <rect x="150" y="90" width="120" height="280" rx="60" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <clipPath id="tubeClip">
      <rect x="150" y="90" width="120" height="280" rx="60"/>
    </clipPath>
    <g clip-path="url(#tubeClip)">
      <rect x="150" y="230" width="120" height="140" fill="url(#heroWater)"/>
      <path d="M150 230 Q 180 218 210 230 T 270 230" fill="none" stroke="#56E5DE" stroke-width="3" opacity="0.7"/>
      <path d="M150 236 Q 180 224 210 236 T 270 236" fill="none" stroke="#21C7C0" stroke-width="2" opacity="0.5"/>
    </g>
    <!-- threshold marker -->
    <line x1="140" y1="185" x2="280" y2="185" stroke="#E8425A" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="286" y="189" fill="#E8425A" font-family="IBM Plex Mono, monospace" font-size="12">THRESHOLD</text>
  </g>

  <!-- floating data chips -->
  <g font-family="IBM Plex Mono, monospace" font-size="12" fill="#8DA0B3">
    <g transform="translate(20,120)">
      <rect width="108" height="46" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
      <text x="12" y="19" fill="#8DA0B3" font-size="10">RAINFALL</text>
      <text x="12" y="36" fill="#EAF2F5" font-size="15" font-weight="600">482mm</text>
    </g>
    <g transform="translate(292,300)">
      <rect width="112" height="46" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
      <text x="12" y="19" fill="#8DA0B3" font-size="10">RISK LEVEL</text>
      <text x="12" y="36" fill="#F5B942" font-size="15" font-weight="600">MODERATE</text>
    </g>
  </g>

  <!-- rising bubbles -->
  <circle cx="180" cy="330" r="4" fill="#56E5DE" opacity="0.6"/>
  <circle cx="230" cy="300" r="3" fill="#56E5DE" opacity="0.5"/>
  <circle cx="205" cy="350" r="2.5" fill="#56E5DE" opacity="0.4"/>
</svg>
